name: Build Release Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify
        run: |
          python3 -m py_compile daily_pulse.py daily_pulse_app.py test_daily_pulse.py
          python3 -m unittest -v

      - name: Build macOS DMG
        run: bash scripts/build_macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyPulse-macOS
          path: dist/DailyPulse-macOS.dmg

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DailyPulse-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify
        run: |
          python -m py_compile daily_pulse.py daily_pulse_app.py test_daily_pulse.py
          python -m unittest -v

      - name: Build Windows exe
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyPulse-Windows
          path: dist/DailyPulse-Windows.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DailyPulse-Windows.zip
